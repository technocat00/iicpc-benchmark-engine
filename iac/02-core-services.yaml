# Telemetry Ingester
apiVersion: apps/v1
kind: Deployment
metadata:
  name: telemetry-ingester
  namespace: iicpc-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telemetry-ingester
  template:
    metadata:
      labels:
        app: telemetry-ingester
    spec:
      containers:
        - name: telemetry-ingester
          image: iicpc/telemetry-ingester:latest
          imagePullPolicy: Never # Assuming local build
          env:
            - name: KAFKA_ADDR
              value: "redpanda.iicpc-system.svc.cluster.local:9092"
            - name: REDIS_URL
              value: "redis://redis.iicpc-system.svc.cluster.local:6379"
          ports:
            - containerPort: 4000
---
apiVersion: v1
kind: Service
metadata:
  name: telemetry-ingester
  namespace: iicpc-system
spec:
  selector:
    app: telemetry-ingester
  ports:
    - port: 4000
      targetPort: 4000
---
# Sandboxing Engine
apiVersion: apps/v1
kind: Deployment
metadata:
  name: sandboxing-engine
  namespace: iicpc-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sandboxing-engine
  template:
    metadata:
      labels:
        app: sandboxing-engine
    spec:
      serviceAccountName: sandboxing-engine-sa
      containers:
        - name: sandboxing-engine
          image: iicpc/sandboxing-engine:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: sandboxing-engine
  namespace: iicpc-system
spec:
  selector:
    app: sandboxing-engine
  ports:
    - port: 3000
      targetPort: 3000
---
# Frontend Next.js
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: iicpc-system
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: iicpc/frontend:latest
          imagePullPolicy: Never
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://telemetry-ingester.iicpc-system.svc.cluster.local:4000"
          ports:
            - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: iicpc-system
type: LoadBalancer
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 3000
